name: annotation

channels:
  - conda-forge
  - bioconda
  - anaconda
dependencies:
  - conda-forge::python=3.9
  - conda-forge::scanpy=1.9.3
  - conda-forge::anndata=0.9.2   # scanpy 1.9.3 needs anndata<0.10 (AlignedViewMixin removed in 0.10)
  - conda-forge::leidenalg
  - conda-forge::jupyterlab
  - conda-forge::jupyter_server=2.6.0
  - conda-forge::umap-learn=0.5.3
  - conda-forge::pynndescent
  - conda-forge::scikit-learn=1.2.2   # <1.3: pynndescent/umap 0.5.3 import sklearn.neighbors.DistanceMetric (moved in 1.3)
  - conda-forge::pytorch-cpu>=1.13
  - bioconda::celltypist=1.5.0
  - anaconda::pandas=1.5.2
  - conda-forge::pip=24.3.1   # pin to a Python-3.9-compatible pip (pip>=25.3 dropped 3.9 support)
  - pip:
      - scarches==0.5.9
      - scvi-tools==1.0.0